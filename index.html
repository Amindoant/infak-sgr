<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Laporan Infak Perumahan Star Garden Residence</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
  <div class="report-header">
  <h2>LAPORAN KEUANGAN INFAK</h2>
  <h3>Pembangunan Musholla</h3>
  <h3>Perumahan Star Garden Residence (SGR)</h3>
  <p id="periode"></p>
 </div>

  <button onclick="loadData()">Refresh</button>
 <a href="material.html">🧱 Lihat Material Sumbangan</a>
  <!-- INFAK -->
  <h2>📊 Data Infak</h2>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Tanggal</th>
          <th>Keterangan</th>
          <th>Jumlah</th>
        </tr>
      </thead>
      <tbody id="dataInfak"></tbody>
    </table>
  </div>

  <h3>Total Infak: Rp <span id="totalInfak">0</span></h3>

  <!-- DONATUR -->
  <h2>🟢 Donatur Tambahan</h2>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Tanggal</th>
          <th>Keterangan</th>
          <th>Jumlah</th>
        </tr>
      </thead>
      <tbody id="dataDonatur"></tbody>
    </table>
  </div>

  <h3>Total Donatur: Rp <span id="totalDonatur">0</span></h3>

  <!-- TOTAL -->
  <div class="total-box">
    TOTAL KESELURUHAN: Rp <span id="grandTotal">0</span>
  </div>
</div>


<script src="app.js"></script>

</body>
</html>
